name: Bundle Models

on:
  workflow_dispatch:
    inputs:
      retention_days:
        description: Artifact retention in days
        required: false
        default: "14"

jobs:
  bundle:
    # Safety rail: this workflow is intended for the offline fork only.
    if: github.repository == 'Ian25/qmd-offline'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Prepare model directory
        run: mkdir -p models

      - name: Install huggingface-hub
        run: pip install -q huggingface-hub

      - name: Download models from Hugging Face
        shell: python
        run: |
          import os
          import hashlib
          from pathlib import Path
          from huggingface_hub import hf_hub_download

          os.makedirs('models', exist_ok=True)

          models = [
              ('embed', 'ggml-org/embeddinggemma-300M-GGUF', 'embeddinggemma-300M-Q8_0.gguf'),
              ('generate', 'tobil/qmd-query-expansion-1.7B-gguf', 'qmd-query-expansion-1.7B-q4_k_m.gguf'),
              ('rerank', 'ggml-org/Qwen3-Reranker-0.6B-Q8_0-GGUF', 'qwen3-reranker-0.6b-q8_0.gguf'),
          ]

          for kind, repo_id, filename in models:
              org = repo_id.split('/')[0]
              cache_name = f'hf_{org}_{filename}'
              etag_name = f'{filename}.etag'
              
              print(f'Downloading {kind}: {repo_id}/{filename}')
              
              # Download file
              path = hf_hub_download(
                  repo_id=repo_id,
                  filename=filename,
                  local_dir='models',
                  local_dir_use_symlinks=False
              )
              
              # Move/rename to cache-compatible filename
              import shutil
              cache_path = f'models/{cache_name}'
              if path != cache_path:
                  shutil.move(path, cache_path)
              
              # Validate GGUF magic bytes
              with open(cache_path, 'rb') as f:
                  magic = f.read(4)
              
              if magic != b'GGUF':
                  raise ValueError(f'Invalid GGUF magic bytes for {kind}')
              
              # Generate SHA256
              sha256_hash = hashlib.sha256()
              with open(cache_path, 'rb') as f:
                  for chunk in iter(lambda: f.read(4096), b''):
                      sha256_hash.update(chunk)
              
              sha = sha256_hash.hexdigest()
              with open(f'{cache_path}.sha256', 'w') as f:
                  f.write(f'{sha}  {cache_name}\n')
              
              # Save etag file (using SHA256 as stable identifier for now)
              with open(f'models/{etag_name}', 'w') as f:
                  f.write(f'{sha}\n')
              
              size_bytes = Path(cache_path).stat().st_size
              print(f'  sha256: {sha}')
              print(f'  size: {size_bytes} bytes')

      - name: Upload embed artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-embed
          path: |
            models/hf_ggml-org_embeddinggemma-300M-Q8_0.gguf
            models/hf_ggml-org_embeddinggemma-300M-Q8_0.gguf.sha256
            models/embeddinggemma-300M-Q8_0.gguf.etag
          if-no-files-found: error
          retention-days: ${{ fromJSON(inputs.retention_days) }}

      - name: Upload generate artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-generate
          path: |
            models/hf_tobil_qmd-query-expansion-1.7B-q4_k_m.gguf
            models/hf_tobil_qmd-query-expansion-1.7B-q4_k_m.gguf.sha256
            models/qmd-query-expansion-1.7B-q4_k_m.gguf.etag
          if-no-files-found: error
          retention-days: ${{ fromJSON(inputs.retention_days) }}

      - name: Upload rerank artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-rerank
          path: |
            models/hf_ggml-org_qwen3-reranker-0.6b-q8_0.gguf
            models/hf_ggml-org_qwen3-reranker-0.6b-q8_0.gguf.sha256
            models/qwen3-reranker-0.6b-q8_0.gguf.etag
          if-no-files-found: error
          retention-days: ${{ fromJSON(inputs.retention_days) }}
